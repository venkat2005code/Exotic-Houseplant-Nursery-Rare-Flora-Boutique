<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100%" height="100%">
  <!-- Archway representing a greenhouse window -->
  <path d="M 15 110 L 15 55 A 35 35 0 0 1 85 55 L 85 110" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="5" y1="110" x2="95" y2="110" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Minimalist Monstera Leaf -->
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main stem -->
    <path d="M 50 110 C 48 90 45 70 50 35"/>
    
    <!-- Outer Leaf Silhouette -->
    <!-- Left lobe -->
    <path d="M 50 35 C 30 25 10 50 25 75 C 30 85 40 95 50 110"/>
    <!-- Right lobe -->
    <path d="M 50 35 C 70 25 90 50 75 75 C 70 85 60 95 50 110"/>
    
    <!-- Deep splits (fenestrations) - Left side -->
    <!-- Creating the illusion of cuts by drawing inward lines that meet the outer edge -->
    <path d="M 48 50 Q 30 45 20 52" />
    <path d="M 47 65 Q 25 60 18 70" />
    <path d="M 48 80 Q 30 80 25 90" />
    
    <!-- Deep splits (fenestrations) - Right side -->
    <path d="M 52 50 Q 70 45 80 52" />
    <path d="M 53 65 Q 75 60 82 70" />
    <path d="M 52 80 Q 70 80 75 90" />
    
    <!-- Inner holes (holes near the stem) -->
    <path d="M 40 60 C 38 55 42 52 44 57 C 45 60 41 63 40 60" />
    <path d="M 60 70 C 58 65 62 62 64 67 C 65 70 61 73 60 70" />
    <path d="M 42 75 C 40 70 44 68 45 72 C 46 75 43 78 42 75" />
    
    <!-- Variegation indication (subtle dotted line pattern on one side) -->
    <path d="M 55 40 Q 65 40 70 50" stroke-width="1" stroke-dasharray="2 4"/>
    <path d="M 55 55 Q 65 55 75 65" stroke-width="1" stroke-dasharray="2 4"/>
    <path d="M 55 75 Q 65 75 70 85" stroke-width="1" stroke-dasharray="2 4"/>
  </g>
</svg>
